[workspace]
resolver = "3"
members = ["crates/*"]

[workspace.package]
version = "0.0.0"
edition = "2024"
rust-version = "1.85"
authors = ["Martin Zajic <martin.zajic@keboola.com>"]
license = "MIT"
repository = "https://github.com/zajca/zwhisper"
homepage = "https://github.com/zajca/zwhisper"
readme = "README.md"

[workspace.dependencies]
# CLI
clap = { version = "4.5", features = ["derive"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
tracing-appender = "0.2"

# Errors
thiserror = "2"
color-eyre = "0.6"

# Time
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }

# Audio (M0)
gstreamer = "0.23"
tokio = { version = "1", features = ["signal", "rt", "macros", "time", "sync", "process", "io-util", "fs"] }
uuid = { version = "1", features = ["v4"] }

# Paths (XDG)
dirs = "5"

# Async traits + serde + tool discovery (M1)
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
which = "6"
libc = "0.2"

# Profiles (M2)
toml_edit = { version = "0.22", features = ["serde"] }
include_dir = "0.7"
shellexpand = "3"

# IPC / D-Bus (M3)
zbus = { version = "5.15", default-features = false, features = ["tokio"] }
zvariant = "5.7"
futures-util = "0.3"
signal-hook-tokio = { version = "0.3", features = ["futures-v0_3"] }

# Testing helpers
assert_cmd = "2"
predicates = "3"
tempfile = "3"

[workspace.lints.rust]
unsafe_code = "deny"
missing_debug_implementations = "warn"
unreachable_pub = "warn"
unused_must_use = "deny"
rust_2018_idioms = { level = "warn", priority = -1 }

[workspace.lints.clippy]
# Baseline
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }

# Things we never want
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"
todo = "warn"
dbg_macro = "warn"
print_stdout = "allow"   # CLI uses println, fine
print_stderr = "allow"

# Pedantic items that are too noisy in practice
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
return_self_not_must_use = "allow"

[profile.dev]
opt-level = 0
debug = true

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "symbols"
debug = false
panic = "abort"

[profile.release-debug]
inherits = "release"
debug = true
strip = "none"

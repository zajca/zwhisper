# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true
no-default-features = false

[output]
feature-depth = 1

[advisories]
version = 2
# `gstreamer`/`gstreamer-app` 0.25 dropped the transitive `paste`
# dependency, so the former RUSTSEC-2024-0436 ignore is no longer
# needed. Keep this list empty until a new advisory genuinely requires
# a documented exception.
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    # `webpki-roots >= 1.0.7` is dual-licensed MPL-2.0 (code) +
    # CDLA-Permissive-2.0 (the bundled CA root data). CDLA-Permissive
    # is an OSI-friendly permissive license; allowing it keeps the
    # transitive `reqwest -> hyper-rustls -> webpki-roots` graph clean.
    "CDLA-Permissive-2.0",
    # BSL-1.0 (Boost Software License 1.0) is OSI-approved and used
    # by `clipboard-win` + `error-code` (both pulled by the tray's
    # clipboard sink and the win32 fallback layer). Permissive,
    # GPL-compatible, no attribution needed in binaries.
    "BSL-1.0",
    # `Unlicense` is the public-domain dedication used by `ksni`
    # (the StatusNotifierItem tray crate). Equivalent to public
    # domain — no obligations on the consumer.
    "Unlicense",
]
confidence-threshold = 0.93
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace path dependencies (`zwhisper-core = { path = "..." }`) do
# not pin a version field, which cargo-deny would otherwise flag as a
# wildcard. Allow that pattern for path-only deps; external `*`
# versions stay denied.
allow-wildcard-paths = true
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true
no-default-features = false

[output]
feature-depth = 1

[advisories]
version = 2
ignore = [
    # `paste` was archived by its author (`dtolnay/paste`). It is
    # pulled in transitively by `gstreamer 0.23.x` (`gstreamer-rs`
    # macros) and has no safe drop-in replacement until the
    # gstreamer-rs crate graph migrates. The crate is a compile-time
    # macro, performs no I/O, and only operates on tokens during
    # macro expansion — the "unmaintained" designation does not
    # expose us to a runtime issue. Revisit when gstreamer-rs ships
    # a successor.
    { id = "RUSTSEC-2024-0436", reason = "paste is a compile-time macro; transient via gstreamer 0.23. No safe upgrade until gstreamer-rs migrates." },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    # `webpki-roots >= 1.0.7` is dual-licensed MPL-2.0 (code) +
    # CDLA-Permissive-2.0 (the bundled CA root data). CDLA-Permissive
    # is an OSI-friendly permissive license; allowing it keeps the
    # transitive `reqwest -> hyper-rustls -> webpki-roots` graph clean.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

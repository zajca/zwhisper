schema_version = 1
name = "meeting"
description = "Mic + system sink monitor mono mix, auto-transcribed via whisper.cpp. M2 ships mono_mix; stereo_split is the M3+ roadmap."

[sources]
mic = "default"
system_output = "default"
mode = "mono_mix"

[recording]
codec = "flac"
sample_rate = 16000
max_duration_minutes = 180

[transcription]
backend = "whisper-cpp"
model = "small"
language = "auto"
auto = true

[[output]]
type = "file"
path = "~/Recordings/zwhisper/{profile}/{timestamp}.flac"

[hotkey]
toggle = ""

# M7 — Whisper.cpp model SHA256 manifest.
#
# Embedded into the `zwhisper-settings` binary at build time via
# `include_str!` from `src/checksums.rs`. The five entries below are
# the M7 fixed model set (DoD #6, D3); a new model release requires
# a zwhisper release that bumps this file.
#
# Source of truth: https://huggingface.co/ggerganov/whisper.cpp
#
# Each table key is the bare model name (no `ggml-` prefix, no
# `.bin` suffix). The model name participates in URL substitution
# (`{model}` placeholder in `~/.config/zwhisper/models.toml`) and
# in the downloader's atomic rename target name
# (`ggml-<name>.bin`).


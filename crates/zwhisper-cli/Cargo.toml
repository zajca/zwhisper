[package]
name = "zwhisper-cli"
description = "zwhisper command-line interface"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
readme.workspace = true

[[bin]]
name = "zwhisper"
path = "src/main.rs"

[dependencies]
clap = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender = { workspace = true }
color-eyre = { workspace = true }
thiserror = { workspace = true }
gstreamer = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
dirs = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
which = { workspace = true }
chrono = { workspace = true }
tempfile = { workspace = true }

[dev-dependencies]
assert_cmd = { workspace = true }
predicates = { workspace = true }
tempfile = { workspace = true }
serde_json = { workspace = true }
which = { workspace = true }
dirs = { workspace = true }

[features]
default = ["audio-it"]
# Integration tests that drive the live PipeWire/GStreamer path. On
# by default so a plain `cargo test` on the maintainer's box catches
# audio-capture regressions; `record_writes_valid_flac` falls back
# to a clear runtime skip when no PipeWire socket is reachable, so
# headless CI runners without audio hardware still produce a green
# build instead of a false negative. Run `cargo test
# --no-default-features` to compile out the live test entirely.
audio-it = []

[lints]
workspace = true

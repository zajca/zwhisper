schema_version = 1
name = "default"
description = "Mic + system sink monitor mono mix, no auto-transcription. Backstop preset for users without a customized profile. M2 ships mic+monitor only; a true mic-only preset lands in M3."

[sources]
mic = "default"
system_output = "default"
mode = "mono_mix"

[recording]
codec = "flac"
sample_rate = 16000
max_duration_minutes = 240

[transcription]
backend = "whisper-cpp"
model = "small"
language = "auto"
auto = false

[[output]]
type = "file"
path = "~/Recordings/zwhisper/{profile}/{timestamp}.flac"

[hotkey]
toggle = ""

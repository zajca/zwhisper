name: Security audit

on:
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - ".github/workflows/audit.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - ".github/workflows/audit.yml"
  schedule:
    # Weekly Monday 06:00 UTC — catch newly-disclosed CVEs.
    - cron: "0 6 * * 1"

permissions:
  contents: read
  # `rustsec/audit-check` posts a check-run with the audit summary;
  # without `checks: write` it errors with "Resource not accessible".
  checks: write

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Match the ignore list in `deny.toml` so both advisory
          # checks stay aligned. RUSTSEC-2024-0436 is `paste`
          # (unmaintained, transient via gstreamer 0.23 — no safe
          # upgrade available; revisit once gstreamer-rs migrates).
          ignore: RUSTSEC-2024-0436

  cargo-deny:
    name: cargo deny
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [advisories, bans, licenses, sources]
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check ${{ matrix.check }}

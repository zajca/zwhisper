name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install build deps
        uses: ./.github/actions/install-build-deps
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install build deps
        uses: ./.github/actions/install-build-deps
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features --no-fail-fast

  build:
    name: build (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install build deps
        uses: ./.github/actions/install-build-deps
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --release --locked

  docs:
    name: doc build
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v6
      - name: Install build deps
        uses: ./.github/actions/install-build-deps
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features

  packaging-shell:
    name: packaging shell tests (M8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install desktop-file-utils + libxml2-utils
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y desktop-file-utils libxml2-utils
      - name: PKGBUILD metadata smoke
        run: bash packaging/arch/tests/pkgbuild_metadata.sh
      - name: PKGBUILD install-path smoke
        run: bash packaging/arch/tests/install_paths.sh
      - name: Validate desktop entries
        run: |
          desktop-file-validate packaging/zwhisper.desktop
          desktop-file-validate packaging/zwhisper-settings.desktop
      - name: Validate icon SVG
        run: xmllint --noout assets/icons/zwhisper.svg

  version-handshake:
    name: version handshake (M8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install build deps
        uses: ./.github/actions/install-build-deps
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Run M8 protocol-version + handshake tests
        run: |
          cargo test -p zwhisper-ipc --test m8_protocol_version
          cargo test -p zwhisper-ipc --test wire_freeze
          cargo test -p zwhisperd --test m8_dbus_protocol_version
          cargo test -p zwhisper-cli --test m8_version_handshake
          cargo test -p zwhisper-tray --test m8_icon_asset

# zwhisper key bindings for Sway / i3-compatible compositors.
#
# Install: copy the two helper scripts to a directory on your PATH
# (e.g. ~/.local/bin), then include this file from your sway config:
#
#     include ~/.config/sway/zwhisper.conf
#
# or just paste the bindsym lines into your existing config. Adjust
# $zwhisper_mod to taste. The scripts live in contrib/bin/ of the
# zwhisper repository.

# Modifier chord used for all zwhisper bindings (Super+Ctrl by default).
set $zwhisper_mod Mod4+Ctrl

# Push-to-dictate: press once to record the mic, again to stop —
# the transcript lands in the clipboard (paste with Ctrl+V).
bindsym $zwhisper_mod+r exec ~/.local/bin/zwhisper-dictate

# Cycle the active profile (default -> meeting -> ... -> wrap).
bindsym $zwhisper_mod+p exec ~/.local/bin/zwhisper-cycle-profile

# Show the current daemon status in a notification.
bindsym $zwhisper_mod+s exec notify-send -a zwhisper "zwhisper status" "$(zwhisper status)"

# Meeting recording via the daemon (mic + system audio mono mix).
# Toggle on/off; auto-transcribes on stop if the active profile sets
# `auto = true`.
bindsym $zwhisper_mod+t exec zwhisper toggle

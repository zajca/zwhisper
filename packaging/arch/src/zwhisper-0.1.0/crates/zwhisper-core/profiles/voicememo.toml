schema_version = 1
name = "voicememo"
description = "Mic + system sink monitor mono mix sized for short memos (30-min cap), with auto-transcribe. M2 ships mic+monitor only; the mic-only voicememo preset lands in M3."

[sources]
mic = "default"
system_output = "default"
mode = "mono_mix"

[recording]
codec = "flac"
sample_rate = 16000
max_duration_minutes = 30

[transcription]
backend = "whisper-cpp"
model = "small"
language = "auto"
auto = true

[[output]]
type = "file"
path = "~/Recordings/zwhisper/{profile}/{timestamp}.flac"

[hotkey]
toggle = ""

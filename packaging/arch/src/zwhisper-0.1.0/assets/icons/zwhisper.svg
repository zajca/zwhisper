<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  zwhisper — application icon (M8 DoD #18).

  Single-layer, single-colour SVG. No embedded raster, no script.
  Microphone glyph + waveform. Colour is `currentColor` so the
  icon picks up the active theme's accent automatically.

  Validated by `crates/zwhisper-tray/tests/m8_icon_asset.rs`.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     width="64"
     height="64"
     fill="none"
     stroke="currentColor"
     stroke-width="3.5"
     stroke-linecap="round"
     stroke-linejoin="round">
  <!-- Microphone capsule -->
  <rect x="24" y="10" width="16" height="28" rx="8" ry="8" fill="currentColor" stroke="none"/>
  <!-- Stand arc -->
  <path d="M16 30 c0 9 7 16 16 16 c9 0 16 -7 16 -16"/>
  <!-- Stand pole + base -->
  <line x1="32" y1="46" x2="32" y2="56"/>
  <line x1="22" y1="56" x2="42" y2="56"/>
  <!-- Waveform (right of mic) suggesting "transcription" -->
  <line x1="52" y1="22" x2="52" y2="34"/>
  <line x1="58" y1="18" x2="58" y2="38"/>
</svg>
